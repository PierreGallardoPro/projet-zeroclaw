# ==========================================
# Logrotate — projet-zeroclaw
# Fichier à placer dans : /etc/logrotate.d/zeroclaw
# ==========================================
#
# Les logs Docker json-file sont stockés dans :
#   /var/lib/docker/containers/<container-id>/<container-id>-json.log
#
# Docker gère déjà la rotation via max-size / max-file dans docker-compose.yml.
# Ce fichier assure une rotation supplémentaire sur les exports (voir logs.sh).
#

/var/log/zeroclaw/*.log {
    # Rotation quotidienne
    daily

    # Conserver 14 jours de logs
    rotate 14

    # Compresser les anciens fichiers (gzip)
    compress

    # Ne pas compresser le fichier de la veille (en cours d'écriture possible)
    delaycompress

    # Ne pas planter si le fichier est absent
    missingok

    # Ne pas tourner si le fichier est vide
    notifempty

    # Créer le nouveau fichier avec les bons droits
    create 0640 root root

    # Pas de signal à envoyer — les logs sont gérés par Docker, pas un daemon
    nosharedscripts
}
