services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    environment:
      - PORT=20128
      - DATA_DIR=/app/data
    ports:
      - "20128:20128"
    volumes:
      - omniroute-data:/app/data

  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_PROVIDER=custom:http://omniroute:20128/v1
      - API_KEY=${OMNIROUTE_API_KEY}
      - ZEROCLAW_MODEL=${AI_MODEL}
    ports:
      - "42617:42617"
    volumes:
      - zeroclaw-data:/zeroclaw-data

  mail-agent:
    build: ./mail_agent
    container_name: mail_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # L'agent Python communique avec OmniRoute via le réseau Docker interne
      - OMNIROUTE_URL=http://omniroute:20128/v1/chat/completions
    depends_on:
      - omniroute

  mail-agent-gmail:
    build: ./mail_agent_gmail
    container_name: mail_agent_gmail
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OMNIROUTE_URL=http://omniroute:20128/v1/chat/completions
    depends_on:
      - omniroute

  log-agent:
    build: ./log_agent
    container_name: log_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OMNIROUTE_URL=http://omniroute:20128/v1/chat/completions
      - INTERVAL_SECONDS=21600
      - REPORT_DIR=/reports
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - log-reports:/reports                           
    depends_on:
      - omniroute

volumes:
  omniroute-data:
  zeroclaw-data:
  log-reports: