services:

  # ==========================================
  # SOCLE IA — toujours actif
  # ==========================================
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: on-failure:3
    environment:
      - PORT=20128
      - DATA_DIR=/app/data
    ports:
      - "20128:20128"
    volumes:
      - omniroute-data:/app/data
    networks:
      - zeroclaw-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: on-failure:3
    env_file:
      - .env
    environment:
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_PROVIDER=custom:http://omniroute:20128/v1
      - API_KEY=${OMNIROUTE_API_KEY}
      - ZEROCLAW_MODEL=${AI_MODEL}
    ports:
      - "42617:42617"
    volumes:
      - zeroclaw-data:/zeroclaw-data
    networks:
      - zeroclaw-net
    depends_on:
      omniroute:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ==========================================
  # AGENTS
  # ==========================================
  mail-agent:
    build: ./mail_agent
    container_name: mail_agent
    restart: on-failure:3
    env_file:
      - .env
    environment:
      - OMNIROUTE_URL=http://omniroute:20128/v1/chat/completions
      - LOG_FILE=/app/logs/agents.jsonl
      - AGENT_NAME=mail-agent
    volumes:
      - agents-logs:/app/logs
    networks:
      - zeroclaw-net
    depends_on:
      omniroute:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  mail-agent-gmail:
    build: ./mail_agent_gmail
    container_name: mail_agent_gmail
    restart: on-failure:3
    env_file:
      - .env
    environment:
      - OMNIROUTE_URL=http://omniroute:20128/v1/chat/completions
      - LOG_FILE=/app/logs/agents.jsonl
      - AGENT_NAME=mail-agent-gmail
    volumes:
      - agents-logs:/app/logs
    networks:
      - zeroclaw-net
    depends_on:
      omniroute:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

# ==========================================
# RÉSEAU INTERNE ISOLÉ
# ==========================================
networks:
  zeroclaw-net:
    driver: bridge
    internal: false

# ==========================================
# VOLUMES
# ==========================================
volumes:
  omniroute-data:
  zeroclaw-data: